<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>DHL KB - Viewer</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;background:#f5f5f5}.navbar{background:#CC0000;color:white;padding:15px 30px;display:flex;justify-content:space-between;align-items:center}.navbar h1 span{color:#FFCC00}.nav-links a{color:white;text-decoration:none;margin-left:15px;font-weight:bold}.nav-links button{background:#FFCC00;color:#333;border:none;padding:8px 15px;border-radius:5px;cursor:pointer;font-weight:bold;margin-left:15px}.container{padding:30px}.search-bar{display:flex;gap:10px;margin-bottom:20px}.search-bar input,.search-bar select{padding:10px;border:1px solid #ddd;border-radius:5px;font-size:1rem}.search-bar button{background:#CC0000;color:white;border:none;padding:10px 20px;border-radius:5px;cursor:pointer;font-weight:bold}.article-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:20px}.card{background:white;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}.card h3{color:#333;margin-bottom:8px}.card p{color:#666;margin-bottom:10px;font-size:0.9rem}.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:0.8rem;font-weight:bold;margin-right:5px}.Draft{background:#FFF3CD;color:#856404}.Reviewed{background:#D1ECF1;color:#0C5460}.Published{background:#D4EDDA;color:#155724}.card-actions{margin-top:15px;display:flex;gap:8px}.card-actions button{padding:6px 12px;border:none;border-radius:5px;cursor:pointer;font-size:0.85rem;font-weight:bold}.btn-delete{background:#CC0000;color:white}.btn-promote{background:#FFCC00;color:#333}.btn-edit{background:#007bff;color:white}</style></head><body><nav class="navbar"><h1>DHL <span>Knowledge Base</span></h1><div class="nav-links"><a href="dashboard.html">Dashboard</a><a href="upload.html">Upload</a><a href="viewer.html">Viewer</a><button onclick="logout()">Logout</button></div></nav><div class="container"><h2 style="color:#333;m
