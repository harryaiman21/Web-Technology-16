<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>DHL KB - Upload Console</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;background:#f5f5f5}.navbar{background:#CC0000;color:white;padding:15px 30px;display:flex;justify-content:space-between;align-items:center}.navbar h1 span{color:#FFCC00}.nav-links a{color:white;text-decoration:none;margin-left:15px;font-weight:bold}.nav-links button{background:#FFCC00;color:#333;border:none;padding:8px 15px;border-radius:5px;cursor:pointer;font-weight:bold;margin-left:15px}.container{padding:30px;max-width:800px;margin:0 auto}.form-card{background:white;padding:30px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}.form-group{margin-bottom:20px}label{display:block;color:#555;margin-bottom:5px;font-weight:bold}input,textarea,select{width:100%;padding:12px;border:1px solid #ddd;border-radius:5px;font-size:1rem;font-family:Arial,sans-serif}textarea{height:150px;resize:vertical}input:focus,textarea:focus,select:focus{outline:none;border-color:#CC0000}.btn{background:#CC0000;color:white;border:none;padding:12px 25px;border-radius:5px;cursor:pointer;font-size:1rem;font-weight:bold}.btn:hover{background:#990000}</style></head><body><nav class="navbar"><h1>DHL <span>Knowledge Base</span></h1><div class="nav-links"><a href="dashboard.html">Dashboard</a><a href="upload.html">Upload</a><a href="viewer.html">Viewer</a><button onclick="logout()">Logout</button></div></nav><div class="container"><h2 style="color:#333;margin-bottom:20px">Upload Console - Create New Article</h2><div class="form-card"><div class="form-group"><label>Article Title *</label><input type="text" id="title" placeholder="Enter article title"></div><div class="form-group"><label>Summary *</label><input type="text" id="summary" placeholder="Brief summary"></div><div class="form-group"><label>Content *</label><textarea id="content" placeholder="Full article content..."></textarea></div><div class="form-group"><label>Tags</label><input type="text" id="tags" placeholder="tag1, tag2, tag3"></div><div class="form-group"><label>Status</label><select id="status"><option value="Draft">Draft</option><option value="Reviewed">Reviewed</option><option value="Published">Published</option></select></div><button class="btn" onclick="saveArticle()">Save Article</button></div></div><script src="app.js"></script><script>checkAuth();</script></body></html>
