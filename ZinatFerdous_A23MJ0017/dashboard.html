<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>DHL KB - Dashboard</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;background:#f5f5f5}.navbar{background:#CC0000;color:white;padding:15px 30px;display:flex;justify-content:space-between;align-items:center}.navbar h1 span{color:#FFCC00}.nav-links a{color:white;text-decoration:none;margin-left:15px;font-weight:bold}.nav-links button{background:#FFCC00;color:#333;border:none;padding:8px 15px;border-radius:5px;cursor:pointer;font-weight:bold;margin-left:15px}.container{padding:30px}h2{color:#333;margin-bottom:25px}.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:30px}.stat-card{background:white;padding:25px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1);text-align:center}.stat-card h3{font-size:2.5rem;color:#CC0000}.stat-card p{color:#666;margin-top:5px}.automation{background:white;padding:25px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}.automation h3{color:#333;margin-bottom:15px}.automation-steps{display:flex;gap:10px;flex-wrap:wrap}.step{background:#f0f0f0;padding:10px 15px;border-radius:20px;font-size:0.9rem}</style></head><body><nav class="navbar"><h1>DHL <span>Knowledge Base</span></h1><div class="nav-links"><a href="dashboard.html">Dashboard</a><a href="upload.html">Upload</a><a href="viewer.html">Viewer</a><button onclick="logout()">Logout</button></div></nav><div class="container"><h2>Dashboard - DHL Knowledge Base</h2><div class="stats-grid"><div class="stat-card"><h3 id="total">0</h3><p>Total Articles</p></div><div class="stat-card"><h3 id="draft">0</h3><p>Draft</p></div><div class="stat-card"><h3 id="reviewed">0</h3><p>Reviewed</p></div><div class="stat-card"><h3 id="published">0</h3><p>Published</p></div></div><div class="automation"><h3>RPA Automation Goal</h3><div class="automation-steps"><span class="step">1. Read logistics files</span><span class="step">2. Check duplicates</span><span class
